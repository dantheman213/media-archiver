name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-name: Media-Archiver-Windows-x64
            artifact-glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            artifact-name: Media-Archiver-macOS-arm64
            artifact-glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            artifact-name: Media-Archiver-macOS-x64
            artifact-glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.rust-target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust-target }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Media Archiver {0}', github.ref_name) || '' }}
          releaseBody: "See the assets below to download the latest version of Media Archiver."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust-target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
